name: Auto Approve

on:
  workflow_run:
    workflows: ["Branch Merge Policy", "Continuous Integration"]
    types: [completed]

jobs:
  auto-approve:
    runs-on: ubuntu-latest

    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.pull_requests[0]
      }}

    permissions:
      contents: read
      pull-requests: write
      checks: read

    steps:
      - name: Check target branch
        id: target
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_REF="${{ github.event.workflow_run.pull_requests[0].base.ref }}"
          echo "Base branch: $BASE_REF"

          if [[ "$BASE_REF" != "main" ]]; then
            echo "::notice::PR targets '$BASE_REF', not 'main'. Skipping."
            echo "is_main=false" >> $GITHUB_OUTPUT
          else
            echo "is_main=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate all required checks passed
        if: steps.target.outputs.is_main == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: checks
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"

          echo "Checking all check-runs for commit $SHA..."

          FAILED=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            --jq '.check_runs[]
              | select(.name != "auto-approve")
              | select(.conclusion != "success")
              | .name')

          if [[ -n "$FAILED" ]]; then
            echo "::error::Some checks not successful: $FAILED"
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "::notice::All checks passed"
          echo "ready=true" >> $GITHUB_OUTPUT

      - name: Get PR number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.checks.outputs.ready == 'true'
        id: pr
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"

          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
            --jq '.[0].number')

          echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Avoid duplicate approvals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.checks.outputs.ready == 'true'
        id: already
        run: |
          PR=${{ steps.pr.outputs.pr }}

          EXISTING=$(gh pr view "$PR" --json reviews \
            --jq '.reviews[] | select(.state=="APPROVED") | .id' | head -n 1)

          if [[ -n "$EXISTING" ]]; then
            echo "already=true" >> $GITHUB_OUTPUT
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      - name: Approve PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.already.outputs.already == 'false' && steps.checks.outputs.ready == 'true'
        run: |
          PR=${{ steps.pr.outputs.pr }}

          echo "Approving PR #$PR"

          gh pr review "$PR" --approve \
            --body "Branch policy and CI checks passed. Auto-approved."
